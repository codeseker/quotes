<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="shortcut icon" href="https://codeseker.github.io/quotes/favicon.ico" type="image/x-icon">
    <title>QuotesExpress</title>
</head>

<body>

    <div class="container my-5 d-flex justify-content-center align-items-center" style="height: 70vh;">

        <div class="card" style="width: 50%;">
            <h5 class="card-header">Quote of the Day</h5>
            <div class="card-body">
                <h5 class="card-title">Be Gratefull</h5>
                <p class="card-text" id="newQuote">Click the button below to get your quote .</p>
                <div class="d-flex">

                    <button id="getQuote" class="btn btn-primary">Get a Quote</button>
                    <button id="toggleMode" type="button" class="btn btn-outline-dark mx-3">Enable Dark Mode</button>
                </div>
            </div>
        </div>
        

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
            crossorigin="anonymous"></script>
        <script src="app.js"></script>

</body>

</html>
